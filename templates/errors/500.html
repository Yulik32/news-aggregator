<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Ошибка сервера</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        
        .server-error {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .server-icon {
            font-size: 80px;
            color: #f5576c;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        .error-code {
            font-size: 100px;
            font-weight: 800;
            color: #333;
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 rgba(245, 87, 108, 0.2);
        }
        
        .error-title {
            font-size: 24px;
            color: #555;
            margin-bottom: 20px;
        }
        
        .error-message {
            color: #777;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .progress-container {
            background: #f0f0f0;
            border-radius: 10px;
            height: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            animation: progress 3s infinite;
        }
        
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 0%; }
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.3);
        }
        
        .btn-outline {
            background: white;
            color: #f5576c;
            border: 2px solid #f5576c;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .btn-outline:hover {
            background: #f5576c;
            color: white;
        }
        
        .report-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: left;
        }
        
        .report-section h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .report-section textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
            resize: vertical;
        }
        
        .report-section button {
            background: #f5576c;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .report-section button:hover {
            background: #f093fb;
        }
    </style>
</head>
<body>
    <div class="server-error">
        <div class="server-icon">
            <i class="fas fa-server"></i>
        </div>
        
        <div class="error-code">500</div>
        <div class="error-title">Ошибка на сервере</div>
        
        <div class="error-message">
            Что-то пошло не так, но наши лучшие программисты<br>
            уже чинят этот баг! (или делают вид, что чинят)
        </div>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        
        <div class="action-buttons">
            <a href="/" class="btn-primary">
                <i class="fas fa-home me-2"></i>
                На главную
            </a>
            <a href="javascript:location.reload()" class="btn-outline">
                <i class="fas fa-sync-alt me-2"></i>
                Обновить
            </a>
        </div>
        
        <div class="report-section">
            <h4><i class="fas fa-bug me-2"></i>Сообщить о проблеме</h4>
            <textarea id="errorReport" rows="2" placeholder="Опишите, что делали перед ошибкой..."></textarea>
            <button onclick="sendReport()">
                <i class="fas fa-paper-plane me-2"></i>Отправить
            </button>
            <div id="reportMessage" style="margin-top: 10px; font-size: 14px;"></div>
        </div>
    </div>
    
    <script>
        function sendReport() {
            const report = document.getElementById('errorReport').value;
            const messageDiv = document.getElementById('reportMessage');
            
            if (!report.trim()) {
                messageDiv.innerHTML = '<span style="color: #f5576c;">Пожалуйста, опишите проблему</span>';
                return;
            }
            
            messageDiv.innerHTML = '<span style="color: #28a745;">✅ Спасибо! Мы скоро всё починим</span>';
            document.getElementById('errorReport').value = '';
            
            // Здесь можно добавить отправку на сервер
            console.log('Report sent:', report);
        }
    </script>
</body>
</html>
