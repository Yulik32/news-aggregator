{% extends "admin/login.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 20px;
    }

    #container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        max-width: 400px;
        width: 100%;
        padding: 0;
        border: none;
    }

    #header {
        background: linear-gradient(135deg, #4361ee, #3a0ca3);
        border-radius: 20px 20px 0 0;
        padding: 30px 20px;
        text-align: center;
        border: none;
    }

    #branding h1 {
        color: white;
        font-size: 24px;
        margin: 0;
        font-weight: 300;
    }

    #branding h1:before {
        font-family: 'Font Awesome 6 Free';
        content: '\f09e';
        margin-right: 10px;
        color: #ffd700;
    }

    #content {
        padding: 40px 30px;
        background: white;
        border-radius: 0 0 20px 20px;
    }

    .form-row {
        padding: 0 0 20px 0;
        border: none;
    }

    .form-row label {
        color: #333;
        font-weight: 500;
        font-size: 14px;
        margin-bottom: 8px;
        display: block;
    }

    .form-row input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e9ecef;
        border-radius: 10px;
        font-size: 14px;
        transition: all 0.3s;
        box-sizing: border-box;
    }

    .form-row input:focus {
        border-color: #4361ee;
        outline: none;
        box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
    }

    .submit-row {
        padding: 20px 0 0 0;
        border: none;
        background: none;
    }

    .submit-row input {
        background: linear-gradient(135deg, #4361ee, #3a0ca3);
        color: white;
        border: none;
        padding: 14px 20px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: all 0.3s;
    }

    .submit-row input:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(67, 97, 238, 0.3);
    }

    .password-reset-link {
        text-align: center;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid #e9ecef;
    }

    .password-reset-link a {
        color: #6c757d;
        text-decoration: none;
        font-size: 14px;
        transition: color 0.3s;
    }

    .password-reset-link a:hover {
        color: #4361ee;
    }

    .errornote {
        background: #f8d7da;
        border: 2px solid #dc3545;
        color: #721c24;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-size: 14px;
    }
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name"><i class="fas fa-rss"></i> Новостной агрегатор · Админ-панель</h1>
{% endblock %}
